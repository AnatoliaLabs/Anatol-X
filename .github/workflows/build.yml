name: Anatol-X CI Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Depoyu Klonla
        uses: actions/checkout@v4

      - name: Runner Disk Alanı Aç
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - name: Bağımlılıkları Kur ve Live-Build'i Kaynaktan Derle
        run: |
          sudo apt-get update
          sudo apt-get install -y debootstrap curl dos2unix git make gettext po4a debian-archive-keyring
          git clone https://salsa.debian.org/live-team/live-build.git
          cd live-build
          sudo make install
          cd ..

      - name: Liquorix Deposunu ve Anahtarlarını Enjekte Et
        run: |
          mkdir -p config/archives
          echo "deb http://liquorix.net/debian sid main" | sudo tee config/archives/liquorix.list.chroot
          echo "deb http://liquorix.net/debian sid main" | sudo tee config/archives/liquorix.list.binary
          curl -fsSL https://liquorix.net/liquorix-keyring.gpg | sudo tee config/archives/liquorix.key.chroot > /dev/null
          curl -fsSL https://liquorix.net/liquorix-keyring.gpg | sudo tee config/archives/liquorix.key.binary > /dev/null

      - name: Dosya Formatlarını ve İzinlerini Düzelt
        run: |
          rm -f config/hooks/live/01-liquorix-repo.hook.chroot
          find auto/ -type f -exec sudo dos2unix {} +
          if [ -d "config/hooks/" ]; then find config/hooks/ -type f -exec sudo dos2unix {} +; fi
          find auto/ -type f -exec sudo chmod +x {} +
          if [ -d "config/hooks/live/" ]; then find config/hooks/live/ -type f -exec sudo chmod +x {} +; fi

      - name: Build Ortamını Sıfırla
        run: sudo lb clean --purge

      - name: Live-Build Konfigürasyonu
        run: sudo lb config

      - name: Anatol-X ISO Build Et ve Yeniden Adlandır
        run: |
          sudo lb build
          # Oluşan karmaşık isimli ISO dosyasını istediğin formata çeviriyoruz
          sudo mv *.iso anatol-x-alpha-1.iso

      - name: Artifact Olarak Yükle (GitHub'da 7 gün yedek olarak kalır)
        uses: actions/upload-artifact@v4
        with:
          name: anatol-x-alpha-1.iso
          path: anatol-x-alpha-1.iso
          retention-days: 7

      - name: Anatol-X ISO'yu SourceForge'a Yükle
        uses: appleboy/scp-action@master
        with:
          host: frs.sourceforge.net
          username: ${{ secrets.SF_USERNAME }}
          key: ${{ secrets.SF_SSH_KEY }}
          source: "anatol-x-alpha-1.iso"
          target: "/home/frs/project/anatolialabs/Alpha-1/"
          # Bazı durumlarda strict host checking kapatmak hata almayı önler:
          strip_components: 0
          tar_tmp_path: /tmp/
