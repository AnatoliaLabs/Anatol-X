name: Anatol-X ISO Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Depoyu Klonla
        uses: actions/checkout@v4

      - name: Disk Alanı Aç
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - name: Gerekli Paketleri Kur
        run: |
          sudo apt update
          sudo apt install -y debootstrap curl git make gettext po4a rsync
          git clone https://salsa.debian.org/live-team/live-build.git
          cd live-build
          sudo make install

      - name: ISO'yu Derle
        run: |
          sudo lb config
          sudo lb build

      - name: SourceForge'a Rsync ile Aktar (2GB+ Desteği)
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SF_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H frs.sourceforge.net >> ~/.ssh/known_hosts
          
          # Boyut sınırlarına takılmadan güvenli aktarım
          rsync -e "ssh -i ~/.ssh/id_rsa" -avP live-image-amd64.hybrid.iso ${{ secrets.SF_USERNAME }}@frs.sourceforge.net:/home/frs/project/anatolialabs/Alpha-1/Anatol-X-26.0.iso
