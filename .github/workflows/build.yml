name: Anatol-X ISO Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Depoyu Klonla
        uses: actions/checkout@v4

      - name: Disk Alanı Aç
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - name: Gerekli Paketleri Kur
        run: |
          sudo apt update
          # debian-archive-keyring paketi eklendi
          sudo apt install -y debootstrap curl git make gettext po4a rsync debian-archive-keyring
          git clone https://salsa.debian.org/live-team/live-build.git
          cd live-build
          sudo make install
   
      - name: Görselleri Konfigürasyona Dağıt
        run: |
          mkdir -p config/includes.chroot/etc/calamares/branding/anatolx/
          mkdir -p config/includes.chroot/usr/share/backgrounds/anatolx/
          mkdir -p config/includes.chroot/usr/share/pixmaps/
          
          # 1. Calamares Hoş Geldin Görseli (.png)
          cp assets/ResizedImage_2026-07-06_15-11-10_3092.png config/includes.chroot/etc/calamares/branding/anatolx/welcome.png
          
          # 2. Selçuklu/Siber Duvar Kağıdı (.png)
          cp assets/58539.png config/includes.chroot/usr/share/backgrounds/anatolx/cyber-geo.png
          
          # 3. Tux Radar Duvar Kağıdı (.jpg - ekran görüntüsüne göre)
          cp assets/IMG-20260506-WA0002.jpg config/includes.chroot/usr/share/backgrounds/anatolx/tux-radar.jpg
          
          # 4. Dağıtım Logosu (.png)
          cp assets/anatol-x-logo.png config/includes.chroot/etc/calamares/branding/anatolx/icon.png
          cp assets/anatol-x-logo.png config/includes.chroot/usr/share/pixmaps/anatolx-logo.png
          
      - name: ISO'yu Derle
        run: |
          sudo lb config
          sudo lb build

      - name: SourceForge'a Rsync ile Aktar (2GB+ Desteği)
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SF_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H frs.sourceforge.net >> ~/.ssh/known_hosts
          
          # Boyut sınırlarına takılmadan güvenli aktarım
          rsync -e "ssh -i ~/.ssh/id_rsa" -avP live-image-amd64.hybrid.iso ${{ secrets.SF_USERNAME }}@frs.sourceforge.net:/home/frs/project/anatolialabs/Alpha-2/Anatol-X-Alpha-2.iso
