name: Anatol-X CI Build

# Sadece manuel tetikleme (GitHub arayüzünden Run workflow butonu ile)
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Depoyu Klonla
        uses: actions/checkout@v4

      - name: Runner Disk Alanı Aç
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - name: Bağımlılıkları Kur ve Live-Build'i Kaynaktan Derle
        run: |
          sudo apt-get update
          # debian-archive-keyring paketi eklendi!
          sudo apt-get install -y debootstrap curl dos2unix git make gettext po4a debian-archive-keyring
          
          # Resmi Debian live-build kaynak kodunu kuruyoruz
          git clone https://salsa.debian.org/live-team/live-build.git
          cd live-build
          sudo make install
          cd ..

      - name: Dosya Formatlarını ve İzinlerini Düzelt
        run: |
          find auto/ -type f -exec sudo dos2unix {} +
          if [ -d "config/hooks/" ]; then find config/hooks/ -type f -exec sudo dos2unix {} +; fi
          sudo chmod +x auto/*
          if [ -d "config/hooks/live/" ]; then sudo chmod +x config/hooks/live/*; fi

      - name: Build Ortamını Sıfırla
        run: sudo lb clean --purge

      - name: Live-Build Konfigürasyonu
        run: sudo lb config

      - name: Anatol-X ISO Build Et
        run: sudo lb build

      - name: Artifact Yükle
        uses: actions/upload-artifact@v4
        with:
          name: Anatol-X-26.0.iso
          path: ./*.iso
          retention-days: 7
