name: Build Anatol-X ISO

on:
  workflow_dispatch:
    inputs:
      release_type:
        description: 'Beta or Final'
        required: true
        default: 'beta'
        type: choice
        options:
        - beta
        - final
      version:
        description: 'Sürüm numarası (örnek: 26.1)'
        required: true
        default: '26.1'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install KIWI
        run: |
          sudo apt update
          sudo apt install -y kiwi-tools

      - name: Build ISO
        run: |
          sudo kiwi-ng --profile AnatolX system build --description config/ --set-release ${{ inputs.version }} --target-dir /tmp/build

      - name: Upload ISO
        uses: actions/upload-artifact@v4
        with:
          name: Anatol-X-${{ inputs.version }}-${{ inputs.release_type }}
          path: /tmp/build/*.iso